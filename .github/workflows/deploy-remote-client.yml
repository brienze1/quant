# Deploy Remote Client (Mobile PWA) to GitHub Pages
#
# The standalone remote client is served at:
#   https://<owner>.github.io/quant-remote/
# so the Vite build must set `base: '/quant-remote/'` (the orchestrator wires
# this into `npm run build:client`, which emits `frontend/dist-client/`).
#
# No owner-specific configuration is needed: the client connects to a rotating
# tunnel URL + passcode entered at runtime, and the backend CORS layer reflects
# the request Origin, so any GitHub Pages origin works out of the box.

name: Deploy Remote Client

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  pages: write
  id-token: write
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build standalone client
        run: npm run build:client
        working-directory: frontend

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist-client

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
