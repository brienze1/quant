name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

  update-homebrew:
    needs: [release]
    runs-on: ubuntu-latest
    steps:
      - name: Get version
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Download source tarball and compute SHA256
        id: sha
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          curl -sL -o source.tar.gz "https://github.com/brienze1/quant/archive/refs/tags/${TAG}.tar.gz"
          echo "sha256=$(sha256sum source.tar.gz | cut -d' ' -f1)" >> $GITHUB_OUTPUT

      - name: Update Homebrew tap
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          repository: brienze1/homebrew-tap
          event-type: update-formula
          client-payload: |
            {
              "version": "${{ steps.version.outputs.tag }}",
              "sha256": "${{ steps.sha.outputs.sha256 }}"
            }
